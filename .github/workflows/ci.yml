name: CI

on:
  push:
    branches: [ "master"]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Test on ${{ matrix.os }} with Zig ${{ matrix.zig }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        zig: ["0.15.1", "0.15.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "${{ matrix.zig }}"

      - name: Run tests
        run: zig build test
